[dependencies.axconfig-macros]
version = "0.2"

[dependencies.axcpu]
version = "0.2"

[dependencies.axplat]
version = "0.3.0"

[dependencies.bitflags]
version = "2.6"

[dependencies.heapless]
version = "0.9"

[dependencies.int_ratio]
version = "0.1"

[dependencies.kspin]
version = "0.1"

[dependencies.lazyinit]
version = "0.2"

[dependencies.log]
version = "0.4"

[dependencies.multiboot]
version = "0.8"

[dependencies.percpu]
version = "0.2"

[dependencies.raw-cpuid]
version = "11.5"

[dependencies.uart_16550]
version = "0.4"

[dependencies.x2apic]
version = "0.5"

[dependencies.x86]
version = "0.52"

[dependencies.x86_64]
version = "0.15.2"

[dependencies.x86_rtc]
optional = true
version = "0.1"

[features]
fp-simd = ["axcpu/fp-simd"]
irq = ["axplat/irq"]
reboot-on-system-off = []
rtc = ["x86_rtc"]
smp = ["axplat/smp", "kspin/smp"]

[lib]
path = "src/lib.rs"

[package]
authors = ["Yuekai Jia <equation618@gmail.com>", "Youjie Zheng <Azure_stars@126.com>", "yanjuguang <coolyanjg@163.com>", "Su Mingxian <aarkegz@gmail.com>", "RobertYuan <634954435@qq.com>", "hky1999 <keyang.hu@qq.com>"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
categories = ["no-std", "hardware-support", "os"]
description = "Implementation of `axplat` hardware abstraction layer for x86 Standard PC machine."
documentation = "https://docs.rs/axplat-x86-pc"
edition = "2024"
homepage = "https://github.com/arceos-org/arceos"
keywords = ["arceos", "os", "hal", "x86"]
license = "GPL-3.0-or-later OR Apache-2.0 OR MulanPSL-2.0"
name = "axplat-x86-pc"
readme = "README.md"
repository = "https://github.com/arceos-org/axplat_crates"
resolver = "2"
version = "0.3.0"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-none"]
