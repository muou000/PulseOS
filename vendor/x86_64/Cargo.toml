[dependencies.bit_field]
version = "0.10.1"

[dependencies.bitflags]
version = "2.3.2"

[dependencies.dep_const_fn]
package = "const_fn"
version = "0.4.11"

[dependencies.rustversion]
version = "1.0.5"

[dependencies.volatile]
version = "0.4.4"

[features]
abi_x86_interrupt = []
asm_const = []
const_fn = []
default = ["nightly", "instructions"]
doc_auto_cfg = []
doc_cfg = []
instructions = []
memory_encryption = []
nightly = ["const_fn", "step_trait", "abi_x86_interrupt", "asm_const"]
step_trait = []

[lib]
path = "src/lib.rs"

[lints.rust.unexpected_cfgs]
check-cfg = ["cfg(kani)"]
level = "warn"
priority = 0

[package]
authors = ["Gerd Zellweger <mail@gerdzellweger.com>", "Eric Kidd <git@randomhacks.net>", "Philipp Oppermann <dev@phil-opp.com>", "Dan Schatzberg <schatzberg.dan@gmail.com>", "John Ericson <John_Ericson@Yahoo.com>", "Rex Lunae <rexlunae@gmail.com>"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
categories = ["no-std"]
description = "Support for x86_64 specific instructions, registers, and structures."
documentation = "https://docs.rs/x86_64"
edition = "2018"
keywords = ["amd64", "x86", "x86_64", "no_std"]
license = "MIT/Apache-2.0"
name = "x86_64"
readme = "README.md"
repository = "https://github.com/rust-osdev/x86_64"
rust-version = "1.59"
version = "0.15.4"

[package.metadata.docs.rs]
all-features = true

[package.metadata.release]
dev-version = false
pre-release-commit-message = "Bump version to {{version}}"
publish = false
push = false
tag = false

[[package.metadata.release.pre-release-replacements]]
exactly = 1
file = "Changelog.md"
replace = """
# Unreleased

# {{version}} – {{date}}"""
search = "# Unreleased"
