[build-dependencies.csv]
optional = true
version = "1.1.5"

[build-dependencies.phf_codegen]
optional = true
version = "0.9.0"

[build-dependencies.serde_json]
optional = true
version = "1.0.61"

[dependencies.bit_field]
version = "0.10.1"

[dependencies.bitflags]
version = "1.*"

[dependencies.phf]
default-features = false
optional = true
version = "0.9.0"

[dependencies.raw-cpuid]
version = "10.2.0"

[features]
performance-counter = ["phf", "phf_codegen", "csv", "serde_json"]
unstable = []
utest = []
vmtest = []

[lib]
path = "src/lib.rs"

[package]
authors = ["Gerd Zellweger <mail@gerdzellweger.com>", "Eric Kidd <git@randomhacks.net>", "Philipp Oppermann <dev@phil-opp.com>", "Dan Schatzberg <schatzberg.dan@gmail.com>", "John Ericson <John_Ericson@Yahoo.com>", "Rex Lunae <rexlunae@gmail.com>", "Brian Martin <bmartin@twitter.com>", "Caleb Boylan <calebboylan@gmail.com>", "Nikolay Edigaryev <edigaryev@gmail.com>", "Stefan Lankes <stlankes@eonerc.rwth-aachen.de>", "Jonathan Klimt <jonathan.klimt@rwth-aachen.de>", "Jens Breitbart <jbreitbart@gmail.com>", "Reto Achermann <achreto@gmail.com>", "woppopo <woppopo@protonmail.com>", "Vikram Narayanan <vikram186@gmail.com>", "Dan Cross <cross@gajendra.net>", "Yuekai Jia <equation618@gmail.com>", "Lucas Kent <rubickent@gmail.com>"]
description = "Library to program x86 (amd64) hardware. Contains x86 specific data structure descriptions, data-tables, as well as convenience function to call assembly instructions typically not exposed in higher level languages."
documentation = "https://docs.rs/x86"
edition = "2018"
exclude = ["./.github/*"]
homepage = "https://github.com/gz/rust-x86"
keywords = ["ia32", "os", "amd64", "x86", "x86-64"]
license = "MIT"
name = "x86"
readme = "README.md"
repository = "https://github.com/gz/rust-x86"
resolver = "2"
version = "0.52.0"

[target.'cfg(target_family = "unix")'.dev-dependencies.klogger]
features = ["use_ioports"]
version = "0.0.14"

[target.'cfg(target_family = "unix")'.dev-dependencies.libc]
version = "0.2.*"
