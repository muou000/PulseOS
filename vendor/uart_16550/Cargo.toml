[dependencies.bitflags]
version = "2"

[dependencies.rustversion]
version = "1.0.5"

[features]
default = []
nightly = []
stable = []

[lib]
path = "src/lib.rs"

[package]
authors = ["Lachlan Sneff <lachlan.sneff@gmail.com>", "Philipp Oppermann <dev@phil-opp.com>"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
description = "Minimal support for uart_16550 serial output."
edition = "2018"
license = "MIT"
name = "uart_16550"
readme = "README.md"
repository = "https://github.com/rust-osdev/uart_16550"
version = "0.4.0"

[package.metadata.docs.rs]
rustdoc-args = ["--cfg", "docsrs"]

[package.metadata.release]
pre-release-commit-message = "Release version {{version}}"

[[package.metadata.release.pre-release-replacements]]
exactly = 1
file = "Changelog.md"
replace = """
# Unreleased

# {{version}} – {{date}}"""
search = "# Unreleased"

[target.'cfg(any(target_arch = "x86", target_arch = "x86_64"))'.dependencies.x86]
version = "0.52"
