[dependencies.axconfig-macros]
version = "0.2"

[dependencies.axcpu]
version = "0.2"

[dependencies.axplat]
version = "0.3.0"

[dependencies.axplat-aarch64-peripherals]
version = "0.3.0"

[dependencies.log]
version = "0.4"

[dependencies.page_table_entry]
version = "0.5"

[features]
fp-simd = ["axcpu/fp-simd"]
irq = ["axplat/irq"]
rtc = []
smp = ["axplat/smp"]

[lib]
path = "src/lib.rs"

[package]
authors = ["Yuekai Jia <equation618@gmail.com>", "Youjie Zheng <Azure_stars@126.com>", "yanjuguang <coolyanjg@163.com>", "Su Mingxian <aarkegz@gmail.com>", "RobertYuan <634954435@qq.com>", "hky1999 <keyang.hu@qq.com>"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
categories = ["embedded", "no-std", "hardware-support", "os"]
description = "Implementation of `axplat` hardware abstraction layer for QEMU ARM64 virtual machine."
documentation = "https://docs.rs/axplat-aarch64-qemu-virt"
edition = "2024"
homepage = "https://github.com/arceos-org/arceos"
keywords = ["arceos", "os", "hal", "embedded", "aarch64"]
license = "GPL-3.0-or-later OR Apache-2.0 OR MulanPSL-2.0"
name = "axplat-aarch64-qemu-virt"
readme = "README.md"
repository = "https://github.com/arceos-org/axplat_crates"
resolver = "2"
version = "0.3.0"

[package.metadata.docs.rs]
targets = ["aarch64-unknown-none"]
