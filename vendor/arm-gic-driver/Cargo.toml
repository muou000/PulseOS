[dependencies.aarch64-cpu]
version = "10.0"

[dependencies.bitflags]
version = "2.9"

[dependencies.enum_dispatch]
version = "0.3"

[dependencies.log]
version = "0.4"

[dependencies.paste]
version = "1"

[dependencies.rdif-intc]
optional = true
version = "0.12"

[dependencies.tock-registers]
version = "0.9"

[features]
rdif = ["rdif-intc"]

[lib]
path = "src/lib.rs"

[package]
authors = ["周睿 <zrufo747@outlook.com>"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
categories = ["embedded", "no-std", "hardware-support"]
description = "A driver for the Arm Generic Interrupt Controller."
edition = "2024"
keywords = ["arm", "aarch64", "driver", "gic", "interrupt-controller"]
license = "MIT"
name = "arm-gic-driver"
readme = "README.md"
repository = "https://github.com/rcore-os/arm-gic-driver"
version = "0.15.12"

[package.metadata.docs.rs]
all-features = true
targets = ["aarch64-unknown-linux-gnu"]
