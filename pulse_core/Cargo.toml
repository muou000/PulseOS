[package]
name = "pulse_core"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
axhal = { workspace = true, features = ["paging"] }
axlog = { workspace = true }
axconfig = { workspace = true }
axerrno = "0.2"
arceos_posix_api = { path = "../arceos/api/arceos_posix_api", features = ["fd"] }
linkme = "0.3"
kernel-elf-parser = { version = "0.3" }
xmas-elf = { version = "0.9" }

axtask = { workspace = true, features = ["multitask"] }
axfs = { path = "../arceos/modules/axfs" }
axmm = { path = "../arceos/modules/axmm" }
memory_addr = { version = "0.4" }

spin = "0.9"
bitflags = "2.11"
